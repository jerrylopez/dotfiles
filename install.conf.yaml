- defaults:
    link:
      relink: true
      force: true

- clean: ["~", "~/.cache"]

- link:
    ~/.gitconfig: config/git/gitconfig
    ~/.gitignore: config/git/gitignore
    ~/.zshrc: config/zsh/zshrc
    ~/Library/Application Support/Code/User/settings.json: config/vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: config/vscode/keybindings.json
    ~/.composer/composer.json: config/composer/composer.json
    ~/.claude/settings.json: config/claude/settings.json
    ~/.claude/skills: config/claude/skills


- shell:
    - [git submodule update --init --recursive]
